<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SENDITIN | Manager Dashboard</title>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --accent: #0084ff; --text: #ffffff; }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
    .login-box { background: var(--card); padding: 40px; border-radius: 20px; text-align: center; width: 320px; }
    .logo { font-size: 32px; font-weight: 900; margin-bottom: 20px; }
    .logo-blue { color: var(--accent); }
    input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 2px solid #334155; background: var(--bg); color: white; text-align: center; }
    button { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; }
    #dashboard { display: none; padding: 20px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
    th { background: #334155; padding: 15px; text-align: left; font-size: 12px; }
    td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  </style>
</head>
<body>
  <div id="login-screen">
    <div class="login-box">
      <div class="logo">SEND<span class="logo-blue">IT</span>IN</div>
      <input type="text" id="coID" placeholder="COMPANY ID">
      <input type="text" id="aKey" placeholder="ALPHA-KEY">
      <button onclick="loadDashboard()">ACCESS SYSTEM</button>
      <p id="msg" style="margin-top:15px; font-size:12px;"></p>
    </div>
  </div>

  <div id="dashboard">
    <div class="logo" style="font-size: 20px;">SEND<span class="logo-blue">IT</span>IN | <span id="clientTag" style="font-weight:400; opacity:0.6;"></span></div>
    <table id="reportTable">
      <thead>
        <tr><th>Date</th><th>Agent</th><th>Assignment</th><th>Qty</th><th>Status</th></tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzMxOxVlypw7fOurOG2r6065YcgE-cjoJy_yThvfNcfQ6c2ztdV6QwX43ifxFA9H2qo/exec'; // PASTE YOUR /exec URL HERE

    async function loadDashboard() {
      const id = document.getElementById('coID').value.toUpperCase();
      const key = document.getElementById('aKey').value.toUpperCase();
      const msg = document.getElementById('msg');
      msg.innerText = "VERIFYING...";

      try {
        const response = await fetch(`${API_URL}?mode=fetch&companyID=${id}&alphaKey=${key}`);
        const data = await response.json();

        if (data.success) {
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
          document.getElementById('clientTag').innerText = data.company;
          renderTable(data.reports);
        } else {
          msg.innerText = "ACCESS DENIED";
          msg.style.color = "red";
        }
      } catch (e) {
        msg.innerText = "CONNECTION ERROR";
      }
    }

    function renderTable(reports) {
      const tbody = document.getElementById('tableBody');
      reports.shift(); // Remove headers
      reports.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${new Date(row[0]).toLocaleDateString()}</td><td>${row[3]}</td><td>${row[5]}</td><td>${row[6]}</td><td>${row[9]}</td>`;
        tbody.appendChild(tr);
      });
    }
  </script>
</body>
</html>
