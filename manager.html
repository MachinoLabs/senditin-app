<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MANAGER | SEND IT IN</title>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #ffffff; --accent: #0d6efd; --success: #198754; }
    * { box-sizing: border-box; margin: 0; font-family: sans-serif; }
    body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    
    /* LOGIN */
    .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; }
    .login-box { background: var(--card); padding: 40px; border-radius: 12px; border: 2px solid var(--border); width: 340px; text-align: center; }
    input { width: 100%; padding: 15px; margin: 10px 0; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 8px; text-transform: uppercase; }

    /* LAYOUT */
    header { padding: 15px 20px; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .main { display: flex; flex: 1; overflow: hidden; }
    #feed { width: 350px; border-right: 2px solid var(--border); overflow-y: auto; padding: 15px; }
    #center { flex: 1; padding: 40px; overflow-y: auto; }
    #right-strip { width: 280px; border-left: 2px solid var(--border); padding: 20px; overflow-y: auto; background: rgba(0,0,0,0.2); }

    /* CARDS & TOGGLES */
    .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
    .card:hover { border-color: var(--accent); }
    .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 13px; font-weight: 700; }
    .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 900; }
    .btn-blue { background: var(--accent); color: white; }
    .btn-green { background: var(--success); color: white; }
  </style>
</head>
<body>

  <div id="login" class="overlay">
    <div class="login-box">
      <h2 style="margin-bottom:20px;">SEND IT IN</h2>
      <input type="text" id="coID" placeholder="Company ID">
      <input type="password" id="pin" placeholder="Master PIN">
      <button class="btn btn-blue" onclick="doLogin()">LOGIN</button>
    </div>
  </div>

  <header>
    <div style="font-weight:900;">SEND<span style="color:var(--accent)">IT</span>IN MANAGER</div>
    <div id="sync">● SYNCING</div>
  </header>

  <div class="main">
    <div id="feed"></div>
    <div id="center">
      <div id="detail">
        <h3 style="color:var(--border)">Select a field report to view details</h3>
      </div>
    </div>
    <div id="right-strip">
      <h4 style="margin-bottom:20px; font-size:12px; color:var(--accent)">FIELD APP SETTINGS</h4>
      <div id="toggle-list"></div>
      <button class="btn btn-green" style="margin-top:20px;" onclick="saveFields()">UPDATE APP</button>
    </div>
  </div>

  <script>
    // --- TESTING CONFIG: CHANGE THESE ---
    const TEST_CO_ID = 'GRV';  
    const TEST_PIN = '300045'; 
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz6Yib3syCndpJWdsstlFG4UGzsWEuOSyuX5TpmfiEaACDuUhBkM2aa3Gbmb8aNIvrM/exec';
    
    let currentData = [];
    let headers = [];

    // Auto-load on page start (Skipping login screen)
    window.onload = () => {
        loadDashboard();
        loadConfig();
    };

    async function loadDashboard() {
      const url = `${scriptURL}?secretKey=MACHINO_V12_SECURE&mode=read&companyID=${auth.co}&secretPIN=${auth.pin}`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        if(data.error) return alert("Login Failed");
        document.getElementById('login').style.display = 'none';
        renderFeed(data.entries);
      } catch(e) { console.error(e); }
    }

    function renderFeed(entries) {
      currentData = entries;
      const f = document.getElementById('feed');
      f.innerHTML = '';
      entries.forEach((row, i) => {
        const c = document.createElement('div');
        c.className = 'card';
        c.onclick = () => showDetail(i);
        c.innerHTML = `<div style="font-weight:900; color:var(--accent)">#${row[3]}</div><div>${row[5]}</div>`;
        f.appendChild(c);
      });
    }

    async function loadConfig() {
      const url = `${scriptURL}?secretKey=MACHINO_V12_SECURE&mode=config&companyID=${auth.co}&secretPIN=${auth.pin}`;
      const res = await fetch(url);
      const config = await res.json();
      const list = document.getElementById('toggle-list');
      list.innerHTML = '';
      // Skip header row
      config.slice(1).forEach(row => {
        const div = document.createElement('div');
        div.className = 'toggle-row';
        div.innerHTML = `<span>${row[0]}</span><input type="checkbox" class="f-check" data-name="${row[0]}" ${row[1] === 'ON' ? 'checked' : ''}>`;
        list.appendChild(div);
      });
    }

    async function saveFields() {
      const settings = Array.from(document.querySelectorAll('.f-check')).map(i => ({ name: i.dataset.name, status: i.checked ? 'ON' : 'OFF' }));
      const url = `${scriptURL}?secretKey=MACHINO_V12_SECURE&mode=config&companyID=${auth.co}&secretPIN=${auth.pin}&saveData=${encodeURIComponent(JSON.stringify(settings))}`;
      await fetch(url);
      alert("Field App Updated!");
    }

    function showDetail(i) {
      const d = currentData[i];
      document.getElementById('detail').innerHTML = `<h2>${d[5]}</h2><hr style="margin:20px 0; border:1px solid var(--border)"><p>${d[8]}</p>`;
    }

    setInterval(loadDashboard, 60000);
  </script>
</body>
</html>
