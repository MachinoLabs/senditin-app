<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEND IT IN</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #ffffff;
      --accent: #38bdf8;
      --border: #334155;
    }

    body.light-mode {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --accent: #0284c7;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    
    body { 
      background-color: var(--bg); 
      color: var(--text); 
      display: flex; 
      justify-content: center; 
      padding: 20px; 
      transition: all 0.3s ease; 
      min-height: 100vh;
    }

    .container { width: 100%; max-width: 450px; display: flex; flex-direction: column; }

    /* Header & Toggle */
    .header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 25px; 
    }
    .header h1 { font-size: 1.4rem; letter-spacing: 2px; color: var(--accent); font-weight: 900; }
    
    #theme-toggle {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text);
    }

    /* Form Fields */
    form { display: flex; flex-direction: column; gap: 18px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; }

    input, textarea {
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }

    input:focus { border-color: var(--accent); }

    /* YES/NO Button Toggles */
    .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .toggle-btn {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .toggle-btn.active {
      background-color: var(--accent);
      color: #0f172a;
      border-color: var(--accent);
    }

    /* Submit Button */
    .submit-btn {
      background-color: var(--accent);
      color: #0f172a;
      border: none;
      border-radius: 10px;
      padding: 18px;
      font-size: 1.1rem;
      font-weight: 900;
      cursor: pointer;
      margin-top: 10px;
      text-transform: uppercase;
    }

    /* Footer Branding */
    .footer {
      text-align: center;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .footer p { font-size: 0.7rem; color: var(--border); letter-spacing: 2px; font-weight: 600; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>SEND IT IN</h1>
    <button id="theme-toggle">🌙</button>
  </div>

  <form id="submit-form">
    <div class="form-group">
      <label>PIN NUMBER</label>
      <input type="number" name="pin" placeholder="Enter PIN" required>
    </div>

    <div class="form-group">
      <label>ASSIGNMENT</label>
      <input type="text" name="assignment" placeholder="Location / Truck #" required>
    </div>

    <div class="form-group">
      <label>QUANTITY / VALUE</label>
      <input type="text" name="quantity" placeholder="Loads / Tons / Amount" required>
    </div>

    <div class="form-group">
      <label>REFERENCE / TICKET #</label>
      <input type="text" name="reference" placeholder="Job #">
    </div>

    <div class="form-group">
      <label>NOTES</label>
      <textarea name="notes" placeholder="Additional details..."></textarea>
    </div>

    <div class="form-group">
      <label>TASK COMPLETE?</label>
      <div class="button-group">
        <button type="button" class="toggle-btn active" onclick="setComplete('YES', this)">YES</button>
        <button type="button" class="toggle-btn" onclick="setComplete('NO', this)">NO</button>
      </div>
      <input type="hidden" name="complete" id="complete-value" value="YES">
    </div>

    <button type="submit" class="submit-btn" id="submit-btn">SEND IT IN</button>
  </form>

  <div class="footer">
    <p>LOGISTICS TRACKING V2.0</p>
  </div>
</div>

<script>
  // Theme Toggle Logic
  const themeToggle = document.getElementById('theme-toggle');
  themeToggle.addEventListener('click', () => {
    document.body.classList.toggle('light-mode');
    themeToggle.innerText = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
  });

  // YES/NO Button Toggle Logic
  function setComplete(val, btn) {
    document.getElementById('complete-value').value = val;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // Form Submission Logic
  const form = document.getElementById('submit-form');
  const submitBtn = document.getElementById('submit-btn');
  const scriptURL = 'https://script.google.com/macros/s/AKfycbxOPI_3MGYK8scF11HdjZQy67fvOI0dQnZnzwQ6xx_UOturhPFDT3EvD0hyLDGw_lOJ_w/exec';

  form.addEventListener('submit', e => {
    e.preventDefault();
    submitBtn.innerText = 'SENDING...';
    submitBtn.disabled = true;

    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(response => {
        alert('SUCCESS: Report Filed!');
        submitBtn.innerText = 'SEND IT IN';
        submitBtn.disabled = false;
        form.reset();
        // Reset the YES/NO buttons to default
        setComplete('YES', document.querySelectorAll('.toggle-btn')[0]);
      })
      .catch(error => {
        alert('ERROR: Check Connection.');
        submitBtn.innerText = 'TRY AGAIN';
        submitBtn.disabled = false;
      });
  });
</script>

</body>
</html>
