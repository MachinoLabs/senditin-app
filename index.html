<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEND IT IN</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    /* 1. BRANDING & THEME COLORS */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    
    body { background-color: #0f172a; color: #ffffff; display: flex; justify-content: center; padding: 30px 20px; transition: background-color 0.3s ease; }
    .container { width: 100%; max-width: 480px; }
    
    /* 2. HEADER & LOGO AREA */
    .header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #1e293b; padding-bottom: 15px; margin-bottom: 25px; }
    .logo-area { display: flex; flex-direction: column; }
    .logo { font-size: 26px; font-weight: 900; letter-spacing: -1.5px; color: #ffffff; text-transform: uppercase; line-height: 1; }
    .logo-blue { color: #0d6efd; }
    .tagline { font-size: 10px; font-weight: 800; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; margin-top: 6px; }
    .tagline-blue { color: #0d6efd; }
    
    /* THEME TOGGLE BUTTON */
    .theme-toggle { font-size: 24px; cursor: pointer; user-select: none; padding: 5px; background: #1e293b; border-radius: 8px; border: 1px solid #334155; line-height: 1; }
    
    /* 3. FORM STYLING */
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 11px; font-weight: 700; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    
    input[type="text"], textarea { width: 100%; background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #ffffff; padding: 14px; font-size: 16px; transition: border-color 0.2s; }
    input:focus, textarea:focus { outline: none; border-color: #0d6efd; }
    textarea { min-height: 100px; resize: none; }
    
    /* YES/NO TOGGLES */
    .toggle-group { display: flex; gap: 12px; }
    .toggle-group input[type="radio"] { display: none; }
    .toggle-label { flex: 1; text-align: center; background-color: #1e293b; padding: 16px; border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer; color: #fff; border: 1px solid #334155; text-transform: uppercase; }
    .toggle-group input[type="radio"]:checked + .toggle-label { background-color: #0d6efd; border-color: #0d6efd; }
    
    /* SUBMIT BUTTON */
    .submit-btn { width: 100%; background-color: #0d6efd; color: #ffffff; border: none; border-radius: 8px; padding: 18px; font-size: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); }
    .submit-btn:disabled { opacity: 0.8; }
    
    /* 4. FOOTER & LIGHT MODE */
    .branding-footer { text-align: center; margin-top: 40px; border-top: 1px solid #1e293b; padding-top: 20px; }
    .footer-text { font-size: 12px; color: #475569; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

    /* LIGHT MODE OVERRIDES */
    body.light-mode { background-color: #f8fafc; color: #0f172a; }
    body.light-mode .logo { color: #0f172a; }
    body.light-mode input, body.light-mode textarea, body.light-mode .toggle-label, body.light-mode .theme-toggle { background-color: #ffffff; border: 1px solid #cbd5e1; color: #0f172a; }
    body.light-mode label { color: #64748b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-area">
        <div class="logo">SEND<span class="logo-blue">IT</span>IN</div>
        <div class="tagline">STUPIDSIMPLE<span class="tagline-blue">CRAZY</span>FAST™</div>
      </div>
      <div class="theme-toggle" id="themeToggle">☀️</div>
    </div>

    <form id="submissionForm">
      <div class="form-group">
        <label>Company PIN</label>
        <input type="text" name="company_pin" placeholder="Enter PIN" required pattern="\d*">
      </div>
      <div class="form-group">
        <label>Crew ID / Truck #</label>
        <input type="text" name="crew_id" placeholder="ID Number" required>
      </div>
      <div class="form-group">
        <label>Customer / Work Order #</label>
        <input type="text" name="work_order" placeholder="WO #" required>
      </div>
      <div class="form-group">
        <label>Work Performed</label>
        <textarea name="work_performed" placeholder="Detailed description..." required></textarea>
      </div>

      <div class="form-group">
        <label>Notes - Follow-ups - Materials</label>
        <textarea name="notes" placeholder="Parts needed or site issues..."></textarea>
      </div>

      <div class="form-group">
        <label>Is Job Finished?</label>
        <div class="toggle-group">
          <input type="radio" id="job-yes" name="job_complete" value="yes" required>
          <label class="toggle-label" for="job-yes">YES</label>
          <input type="radio" id="job-no" name="job_complete" value="no">
          <label class="toggle-label" for="job-no">NO</label>
        </div>
      </div>

      <button type="submit" class="submit-btn">SEND IT IN</button>
    </form>
    
    <div class="branding-footer">
      <p class="footer-text">Built with StupidSimpleCrazyFast™</p>
      <div style="font-size: 10px; color: #1e293b; margin-top: 10px; font-weight: bold;">V8_ACTIVE_STABLE</div>
    </div>
  </div>

  <script>
    // 1. THEME TOGGLE LOGIC
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
      themeToggle.innerText = document.body.classList.contains('light-mode') ? '🌙' : '☀️';
    });

    // 2. FORM SUBMISSION LOGIC
    const scriptURL = 'https://script.google.com/macros/s/AKfycbye0BAdQbvozSKtiasGpzge7vIF_2QNR0-gZhJs4ekXFwyYFytakZ3ChaBzLUNo4ofqFw/exec'; 

    document.getElementById('submissionForm').addEventListener('submit', e => {
      e.preventDefault();
      const submitBtn = document.querySelector('.submit-btn');
      submitBtn.innerText = 'SENDING...';
      submitBtn.disabled = true;

      // JSON PACKAGING (Fixes the Scrambled/Bleeding columns)
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      fetch(scriptURL, { 
        method: 'POST', 
        mode: 'no-cors',
        body: JSON.stringify(data) 
      })
      .then(() => {
        submitBtn.innerText = 'SENT! 👍';
        submitBtn.style.backgroundColor = '#198754';
        e.target.reset();
        setTimeout(() => {
          submitBtn.innerText = 'SEND IT IN';
          submitBtn.style.backgroundColor = ''; 
          submitBtn.disabled = false;
        }, 3000);
      })
      .catch(error => {
        submitBtn.innerText = 'ERROR - TRY AGAIN';
        submitBtn.disabled = false;
      });
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
