<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEND IT IN | FIELD APP</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #0d6efd; --text: #ffffff; --success: #198754; --muted: #94a3b8; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { font-weight: 900; margin: 0; }
        
        label { display: block; font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; margin-top: 20px; }
        input { width: 100%; padding: 16px; border-radius: 10px; border: 1px solid #334155; background: var(--card); color: white; font-size: 16px; }
        
        button { 
            width: 100%; padding: 20px; background: var(--accent); color: white; border: none; border-radius: 10px; 
            font-weight: 900; font-size: 18px; cursor: pointer; margin-top: 30px;
            box-shadow: 0 4px 14px 0 rgba(13, 110, 253, 0.3);
        }
        #out { text-align: center; margin-top: 20px; font-weight: 800; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>SEND<span style="color:var(--accent)">IT</span>IN</h2>
            <div style="font-size:10px; color:var(--muted); margin-top:5px;">FIELD OPERATIONS V14.3</div>
        </div>

        <label>Worker Name</label>
        <input type="text" id="wName" placeholder="Enter Name">

        <label>Assignment</label>
        <input type="text" id="f_assignment" placeholder="Job details">

        <label>Quantity</label>
        <input type="text" id="f_quantity" placeholder="Units / Amount">

        <label>Reference #</label>
        <input type="text" id="f_reference" placeholder="PO or Job #">

        <label>Notes</label>
        <input type="text" id="f_notes" placeholder="Additional info">

        <label>Complete? (YES/NO)</label>
        <input type="text" id="f_complete" placeholder="Is the job finished?">

        <button onclick="submitReport()">SEND IT IN</button>
        <div id="out"></div>
    </div>

    <script>
        const DEBUG_CO = 'GRV';
        const DEBUG_PIN = '300045';
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxy-TDrjDAFKnUJ_wVeCcJwgIET_VA6UVdwL5G75qmFIxT4c6um-iOXb3KE7PMTxIG4/exec';

        async function submitReport() {
            const out = document.getElementById('out');
            out.innerText = "SENDING...";
            
            const name = document.getElementById('wName').value;
            const assignment = document.getElementById('f_assignment').value;
            const quantity = document.getElementById('f_quantity').value;
            const reference = document.getElementById('f_reference').value;
            const notes = document.getElementById('f_notes').value;
            const complete = document.getElementById('f_complete').value;

            if(!name) { out.innerText = "NAME REQUIRED"; return; }

            const params = `?secretKey=MACHINO_V12_SECURE&companyID=${DEBUG_CO}&secretPIN=${DEBUG_PIN}&workerName=${encodeURIComponent(name)}&assignment=${encodeURIComponent(assignment)}&quantity=${encodeURIComponent(quantity)}&reference=${encodeURIComponent(reference)}&notes=${encodeURIComponent(notes)}&complete=${encodeURIComponent(complete)}`;

            try {
                const res = await fetch(scriptURL + params);
                const text = await res.text();
                if (text === "SUCCESS") {
                    out.innerHTML = "<span style='color:var(--success)'>✓ REPORT DELIVERED</span>";
                    document.querySelectorAll('input').forEach(i => i.value = '');
                } else {
                    out.innerText = "ERROR: " + text;
                }
            } catch (e) {
                out.innerText = "CONNECTION ERROR";
            }
        }
    </script>
</body>
</html>
