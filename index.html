<script>
  // 1. YOUR NEW V8 URL
  const scriptURL = 'https://script.google.com/macros/s/AKfycbye0BAdQbvozSKtiasGpzge7vIF_2QNR0-gZhJs4ekXFwyYFytakZ3ChaBzLUNo4ofqFw/exec';

  document.getElementById('submissionForm').addEventListener('submit', e => {
    e.preventDefault();
    const submitBtn = e.target.querySelector('.submit-btn');
    submitBtn.innerText = 'SENDING...';
    submitBtn.disabled = true;

    // 2. THE "JSON" PACKAGING (This stops the scrambling/bleeding)
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());

    fetch(scriptURL, {
      method: 'POST',
      mode: 'no-cors', // Keeps things smooth with Google
      body: JSON.stringify(data) // Sends clean, labeled envelopes
    })
    .then(() => {
      submitBtn.innerText = 'SENT! 👍';
      submitBtn.style.backgroundColor = '#198754';
      e.target.reset();
      setTimeout(() => {
        submitBtn.innerText = 'SEND IT IN';
        submitBtn.style.backgroundColor = ''; 
        submitBtn.disabled = false;
      }, 3000);
    })
    .catch(error => {
      console.error('Error!', error.message);
      submitBtn.innerText = 'RETRY';
      submitBtn.disabled = false;
    });
  });
</script>
