<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEND IT IN</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    body { background-color: #0f172a; color: #ffffff; display: flex; justify-content: center; padding: 30px 20px; }
    .container { width: 100%; max-width: 480px; }
    .header { margin-bottom: 30px; text-align: center; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #94a3b8; text-transform: uppercase; font-size: 0.8rem; }
    input, textarea { width: 100%; padding: 14px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: white; font-size: 1rem; }
    textarea { height: 100px; resize: vertical; }
    .toggle-group { display: flex; gap: 10px; }
    .toggle-group input { display: none; }
    .toggle-label { flex: 1; padding: 14px; text-align: center; background: #1e293b; border: 1px solid #334155; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .toggle-group input:checked + .toggle-label { background: #3b82f6; border-color: #60a5fa; }
    .submit-btn { width: 100%; padding: 16px; background: #3b82f6; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>SEND IT IN</h1>
      <p style="color: #64748b;">Field Reporting Portal v8</p>
    </div>

    <form id="submissionForm">
      <div class="form-group">
        <label>Company PIN</label>
        <input type="text" name="company_pin" placeholder="Enter PIN" required>
      </div>

      <div class="form-group">
        <label>Crew ID / Truck #</label>
        <input type="text" name="crew_id" placeholder="Who is on-site?" required>
      </div>

      <div class="form-group">
        <label>Customer / Work Order #</label>
        <input type="text" name="work_order" placeholder="WO#" required>
      </div>

      <div class="form-group">
        <label>Work Performed</label>
        <textarea name="work_performed" placeholder="Work details..." required></textarea>
      </div>

      <div class="form-group">
        <label>Notes - Follow-ups</label>
        <textarea name="notes" placeholder="Parts needed or follow-up info..."></textarea>
      </div>

      <div class="form-group">
        <label>Job Complete?</label>
        <div class="toggle-group">
          <input type="radio" id="job-yes" name="job_complete" value="yes" required>
          <label class="toggle-label" for="job-yes">YES</label>
          <input type="radio" id="job-no" name="job_complete" value="no">
          <label class="toggle-label" for="job-no">NO</label>
        </div>
      </div>

      <button type="submit" class="submit-btn">SEND IT IN</button>
    </form>
  </div>

  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbye0BAdQbvozSKtiasGpzge7vIF_2QNR0-gZhJs4ekXFwyYFytakZ3ChaBzLUNo4ofqFw/exec';

    document.getElementById('submissionForm').addEventListener('submit', e => {
      e.preventDefault();
      const submitBtn = e.target.querySelector('.submit-btn');
      submitBtn.innerText = 'SENDING...';
      submitBtn.disabled = true;

      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      fetch(scriptURL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(data)
      })
      .then(() => {
        submitBtn.innerText = 'SENT! 👍';
        submitBtn.style.backgroundColor = '#198754';
        e.target.reset();
        setTimeout(() => {
          submitBtn.innerText = 'SEND IT IN';
          submitBtn.style.backgroundColor = '';
          submitBtn.disabled = false;
        }, 3000);
      })
      .catch(error => {
        alert('Error! Check connection.');
        submitBtn.innerText = 'RETRY';
        submitBtn.disabled = false;
      });
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
