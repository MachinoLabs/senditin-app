<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEND IT IN</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    /* Reset & Base Styles */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    
    /* Midnight Navy Theme */
    body { 
      background-color: #0f172a; 
      color: #ffffff; 
      display: flex; 
      justify-content: center; 
      padding: 30px 20px; 
      transition: background-color 0.3s ease, color 0.3s ease; 
    }
    .container { width: 100%; max-width: 480px; }
    
    /* Header & Logo Badge */
    .header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border-bottom: 1px solid #1e293b; 
      padding-bottom: 15px; 
      margin-bottom: 25px; 
      transition: border-color 0.3s ease; 
    }
    
    /* Brand Badge: Locked to Navy/Blue identity */
    .logo-badge { 
      background-color: #0f172a; 
      padding: 8px 14px; 
      border-radius: 6px; 
      display: inline-flex; 
      align-items: center;
      border: 1px solid #1e293b;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    .logo { font-size: 22px; font-weight: 900; letter-spacing: -1px; color: #ffffff; }
    .logo-blue { color: #0d6efd; }
    
    .theme-toggle { font-size: 22px; cursor: pointer; user-select: none; padding: 5px; filter: drop-shadow(0 0 8px rgba(243, 156, 18, 0.2)); }
    
    /* Form Elements */
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 11px; font-weight: 700; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; transition: color 0.3s ease; }
    
    input[type="text"], textarea { 
      width: 100%; 
      background-color: #1e293b; 
      border: 1px solid #334155; 
      border-radius: 6px; 
      color: #ffffff; 
      padding: 14px; 
      font-size: 16px; /* 16px prevents iOS zoom on focus */
      transition: all 0.3s ease; 
    }
    input::placeholder, textarea::placeholder { color: #64748b; }
    input:focus, textarea:focus { outline: none; border-color: #0d6efd; box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.2); }
    textarea { min-height: 100px; resize: vertical; }
    
    /* Yes/No Toggle Buttons */
    .toggle-group { display: flex; gap: 12px; }
    .toggle-group input[type="radio"] { display: none; }
    .toggle-label { 
      flex: 1; 
      text-align: center; 
      background-color: #1e293b; 
      padding: 16px; 
      border-radius: 6px; 
      font-weight: 900; 
      font-size: 16px; 
      cursor: pointer; 
      color: #fff; 
      transition: all 0.2s ease; 
      text-transform: uppercase;
      border: 1px solid #334155;
    }
    .toggle-group input[type="radio"]:checked + .toggle-label { 
      background-color: #334155; 
      border-color: #0d6efd;
      box-shadow: inset 0 0 0 1px #0d6efd; 
    }
    
    /* Submit Button */
    .submit-btn { 
      width: 100%; 
      background-color: #0d6efd; 
      color: #ffffff; 
      border: none; 
      border-radius: 6px; 
      padding: 18px; 
      font-size: 18px; 
      font-weight: 900; 
      text-transform: uppercase; 
      cursor: pointer; 
      margin-top: 10px; 
      transition: background-color 0.2s ease, transform 0.1s active; 
    }
    .submit-btn:hover { background-color: #0b5ed7; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.8; cursor: not-allowed; }
    
    /* Footer Branding */
    .branding { text-align: center; margin-top: 40px; font-size: 12px; color: #475569; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; line-height: 1.6; }
    .branding a { color: #0d6efd; text-decoration: none; }
    .footer-credits { margin-top: 12px; font-size: 10px; color: #334155; }

    /* LIGHT MODE OVERRIDES */
    body.light-mode { background-color: #f8fafc; color: #0f172a; }
    body.light-mode .header { border-bottom: 1px solid #e2e8f0; }
    body.light-mode label { color: #64748b; }
    body.light-mode input[type="text"], body.light-mode textarea { background-color: #ffffff; border: 1px solid #cbd5e1; color: #0f172a; }
    body.light-mode input::placeholder, body.light-mode textarea::placeholder { color: #94a3b8; }
    body.light-mode .toggle-label { background-color: #ffffff; border: 1px solid #cbd5e1; color: #0f172a; }
    body.light-mode .toggle-group input[type="radio"]:checked + .toggle-label { background-color: #f1f5f9; border-color: #0d6efd; }
    body.light-mode .branding { color: #94a3b8; }
    body.light-mode .footer-credits { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-badge">
        <div class="logo">SEND<span class="logo-blue">IT</span>IN</div>
      </div>
      <div class="theme-toggle" id="themeToggle">☀️</div>
    </div>

    <form id="submissionForm">
      <div class="form-group">
        <label>Company PIN</label>
        <input type="text" name="company_pin" placeholder="Enter 4-digit PIN" required pattern="\d*">
      </div>
      <div class="form-group">
        <label>Crew ID / Truck #</label>
        <input type="text" name="crew_id" placeholder="e.g. Truck 4 or Mike's Crew" required>
      </div>
      <div class="form-group">
        <label>Customer / Work Order #</label>
        <input type="text" name="work_order" placeholder="e.g. 123 Main St or WO-405" required>
      </div>
      <div class="form-group">
        <label>Work Performed</label>
        <textarea name="work_performed" placeholder="Describe work completed." required></textarea>
      </div>
      <div class="form-group">
        <label>Job Complete?</label>
        <div class="toggle-group">
          <input type="radio" id="job-yes" name="job_complete" value="yes" required>
          <label class="toggle-label" for="job-yes">YES</label>
          <input type="radio" id="job-no" name="job_complete" value="no">
          <label class="toggle-label" for="job-no">NO</label>
        </div>
      </div>
      <div class="form-group">
        <label>Notes - Follow-ups - Materials</label>
        <textarea name="notes" placeholder="Issues on site, needed for tomorrow..."></textarea>
      </div>
      <button type="submit" class="submit-btn">SEND IT IN</button>
    </form>
    
    <div class="branding">
      <p>Built with the StupidSimpleCrazyFast™ micro-app framework.</p>
      <div class="footer-credits">
        Built by <a href="https://machinolabs.com" target="_blank">MachinoLabs</a> • <a href="https://machinolabs.com" target="_blank">machinolabs.com</a> • <a href="https://stupidsimplecrazyfast.com" target="_blank">stupidsimplecrazyfast.com</a>
        <br>
        Joe • 717.623.2907
      </div>
    </div>
  </div>

  <script>
    // Theme Toggle Logic
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
      if (document.body.classList.contains('light-mode')) {
        themeToggle.innerText = '🌙';
        document.querySelector('meta[name="theme-color"]').setAttribute('content', '#f8fafc');
      } else {
        themeToggle.innerText = '☀️';
        document.querySelector('meta[name="theme-color"]').setAttribute('content', '#0f172a');
      }
    });

    // Form Submission Logic
    const form = document.getElementById('submissionForm');
    const submitBtn = document.querySelector('.submit-btn');
    
    // REPLACE THIS WITH YOUR LIVE DEPLOYED URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyVx_g91DT_xCmIFjWb2UbQNOtNYurABdqzpY8-7_Qc123JO_ugsil63KutS6U7cJNc5w/exec'; 

    form.addEventListener('submit', e => {
      e.preventDefault();
      const originalBtnText = submitBtn.innerText;
      submitBtn.innerText = 'SENDING...';
      submitBtn.style.backgroundColor = '#f39c12';
      submitBtn.disabled = true;

      fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(response => {
          submitBtn.innerText = 'SENT! 👍';
          submitBtn.style.backgroundColor = '#198754';
          form.reset();
          setTimeout(() => {
            submitBtn.innerText = originalBtnText;
            submitBtn.style.backgroundColor = ''; 
            submitBtn.disabled = false;
          }, 3000);
        })
        .catch(error => {
          console.error('Error!', error.message);
          submitBtn.innerText = 'ERROR - TRY AGAIN';
          submitBtn.style.backgroundColor = '#dc3545';
          submitBtn.disabled = false;
        });
    });

    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('PWA Service Worker registered!'))
          .catch(err => console.error('PWA Service Worker failed', err));
      });
    }
  </script>
</body>
</html>
