<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEND IT IN</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    /* Reset & Base Styles */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    
    /* Midnight Navy Theme */
    body { background-color: #0f172a; color: #ffffff; display: flex; justify-content: center; padding: 30px 20px; }
    .container { width: 100%; max-width: 480px; }
    
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; padding-bottom: 15px; margin-bottom: 25px; }
    .logo-badge { background-color: #0f172a; padding: 8px 14px; border-radius: 6px; display: inline-flex; align-items: center; border: 1px solid #1e293b; }
    .logo { font-size: 22px; font-weight: 900; letter-spacing: -1px; color: #ffffff; }
    .logo-blue { color: #0d6efd; }
    .theme-toggle { font-size: 22px; cursor: pointer; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 11px; font-weight: 700; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    
    input[type="text"], textarea { width: 100%; background-color: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #ffffff; padding: 14px; font-size: 16px; }
    textarea { min-height: 100px; resize: vertical; }
    
    .toggle-group { display: flex; gap: 12px; }
    .toggle-group input[type="radio"] { display: none; }
    .toggle-label { flex: 1; text-align: center; background-color: #1e293b; padding: 16px; border-radius: 6px; font-weight: 900; cursor: pointer; border: 1px solid #334155; }
    .toggle-group input[type="radio"]:checked + .toggle-label { background-color: #334155; border-color: #0d6efd; }
    
    .submit-btn { width: 100%; background-color: #0d6efd; color: #ffffff; border: none; border-radius: 6px; padding: 18px; font-size: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
    .branding { text-align: center; margin-top: 40px; font-size: 12px; color: #475569; }
    .branding a { color: #0d6efd; text-decoration: none; }

    body.light-mode { background-color: #f8fafc; color: #0f172a; }
    body.light-mode input, body.light-mode textarea, body.light-mode .toggle-label { background-color: #ffffff; border-color: #cbd5e1; color: #0f172a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-badge">
        <div class="logo">SEND<span class="logo-blue">IT</span>IN</div>
      </div>
      <div class="theme-toggle" id="themeToggle">☀️</div>
    </div>

    <form id="submissionForm">
      <div class="form-group">
        <label>Company PIN</label>
        <input type="text" name="company_pin" placeholder="Enter 4-digit PIN" required pattern="\d*">
      </div>
      <div class="form-group">
        <label>Crew ID / Truck #</label>
        <input type="text" name="crew_id" placeholder="e.g. Truck 4" required>
      </div>
      <div class="form-group">
        <label>Customer / Work Order #</label>
        <input type="text" name="work_order" placeholder="e.g. 123 Main St" required>
      </div>
      <div class="form-group">
        <label>Work Performed</label>
        <textarea name="work_performed" placeholder="Describe work completed." required></textarea>
      </div>

      <div class="form-group">
        <label>Notes - Follow-ups - Materials</label>
        <textarea name="notes" placeholder="Issues on site..."></textarea>
      </div>

      <div class="form-group">
        <label>Job Complete?</label>
        <div class="toggle-group">
          <input type="radio" id="job-yes" name="job_complete" value="yes" required>
          <label class="toggle-label" for="job-yes">YES</label>
          <input type="radio" id="job-no" name="job_complete" value="no">
          <label class="toggle-label" for="job-no">NO</label>
        </div>
      </div>

      <button type="submit" class="submit-btn">SEND IT IN</button>
    </form>
    
    <div class="branding">
      <p>Built with the StupidSimpleCrazyFast™ framework.</p>
      <div style="font-size: 10px; margin-top: 10px;">Built by <a href="https://machinolabs.com" target="_blank">MachinoLabs</a></div>
    </div>
  </div>

  <script>
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
      themeToggle.innerText = document.body.classList.contains('light-mode') ? '🌙' : '☀️';
    });

    const form = document.getElementById('submissionForm');
    const submitBtn = document.querySelector('.submit-btn');
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyVx_g91DT_xCmIFjWb2UbQNOtNYurABdqzpY8-7_Qc123JO_ugsil63KutS6U7cJNc5w/exec'; 

    form.addEventListener('submit', e => {
      e.preventDefault();
      submitBtn.innerText = 'SENDING...';
      submitBtn.disabled = true;

      const formData = new FormData(form);
      const payload = {
        companyPin: formData.get('company_pin'),
        crewId: formData.get('crew_id'),
        workOrder: formData.get('work_order'),
        workPerformed: formData.get('work_performed'),
        jobComplete: formData.get('job_complete'),
        notes: formData.get('notes')
      };

      fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
      .then(() => {
        submitBtn.innerText = 'SENT! 👍';
        form.reset();
        setTimeout(() => { submitBtn.innerText = 'SEND IT IN'; submitBtn.disabled = false; }, 3000);
      })
      .catch(() => {
        submitBtn.innerText = 'ERROR - TRY AGAIN';
        submitBtn.disabled = false;
      });
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
