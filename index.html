<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEND IT IN | WORKER APP</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #0d6efd; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 400px; margin: auto; }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: var(--card); color: white; font-size: 16px; }
        .hidden { display: none; }
        button { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 900; font-size: 18px; cursor: pointer; margin-top: 10px; }
        label { font-size: 12px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .status { text-align: center; margin-top: 10px; font-weight: 800; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center;">SEND<span style="color:var(--accent)">IT</span>IN</h2>
        
        <div id="step1">
            <label>Company ID</label>
            <input type="text" id="coID" placeholder="e.g. GRV" oninput="this.value = this.value.toUpperCase()">
            <label>Security PIN</label>
            <input type="password" id="pin" placeholder="Enter PIN">
            <button onclick="fetchAppConfig()">LOAD MY FORM</button>
        </div>

        <div id="step2" class="hidden">
            <label>Worker Name</label>
            <input type="text" id="workerName" placeholder="Your Name">
            
            <div id="dynamicFields"></div>

            <button onclick="submitData()">SEND IT IN</button>
            <button onclick="location.reload()" style="background:#334155; margin-top:10px; font-size:12px; padding:10px;">RESET / LOGOUT</button>
        </div>

        <div id="out" class="status"></div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz6Yib3syCndpJWdsstlFG4UGzsWEuOSyuX5TpmfiEaACDuUhBkM2aa3Gbmb8aNIvrM/exec';
        let companyID = '';
        let secretPIN = '';

        async function fetchAppConfig() {
            companyID = document.getElementById('coID').value.trim();
            secretPIN = document.getElementById('pin').value.trim();
            document.getElementById('out').innerText = "Syncing with Manager...";

            try {
                const res = await fetch(`${scriptURL}?secretKey=MACHINO_V12_SECURE&mode=config&companyID=${companyID}&secretPIN=${secretPIN}`);
                const config = await res.json();

                if (config.error) {
                    document.getElementById('out').innerText = "AUTH FAILED: Check ID/PIN";
                    return;
                }

                // Build the form based on Manager's Toggles
                const fieldDiv = document.getElementById('dynamicFields');
                fieldDiv.innerHTML = '';
                
                config.slice(1).forEach(row => {
                    if (row[1] === "ON") {
                        const label = document.createElement('label');
                        label.innerText = row[0];
                        const input = document.createElement('input');
                        input.type = "text";
                        input.id = `field_${row[0]}`;
                        input.placeholder = `Enter ${row[0]}`;
                        fieldDiv.appendChild(label);
                        fieldDiv.appendChild(input);
                    }
                });

                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                document.getElementById('out').innerText = "Form Ready.";
            } catch (e) {
                document.getElementById('out').innerText = "Error connecting to Brain.";
            }
        }

        async function submitData() {
            document.getElementById('out').innerText = "SENDING...";
            const name = document.getElementById('workerName').value;
            
            // Collect all visible fields
            let params = `?secretKey=MACHINO_V12_SECURE&companyID=${companyID}&secretPIN=${secretPIN}&workerName=${name}`;
            
            const inputs = document.querySelectorAll('#dynamicFields input');
            inputs.forEach(input => {
                const fieldName = input.id.replace('field_', '').toLowerCase();
                params += `&${fieldName}=${encodeURIComponent(input.value)}`;
            });

            const res = await fetch(scriptURL + params);
            const text = await res.text();
            
            if (text === "SUCCESS") {
                document.getElementById('out').innerHTML = "<span style='color:#198754'>DATA SENT!</span>";
                // Clear inputs
                inputs.forEach(i => i.value = '');
            } else {
                document.getElementById('out').innerText = "ERROR: " + text;
            }
        }
    </script>
</body>
</html>
