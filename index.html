<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEND IT IN</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    /* Reset & Base Styles - From your "Perfect" UI */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    
    body { 
      background-color: #0f172a; 
      color: #ffffff; 
      display: flex; 
      justify-content: center; 
      padding: 30px 20px; 
      transition: background-color 0.3s ease, color 0.3s ease; 
      min-height: 100vh;
    }
    .container { width: 100%; max-width: 480px; }
    
    /* Header & Logo Badge - Restored from original */
    .header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border-bottom: 1px solid #1e293b; 
      padding-bottom: 15px; 
      margin-bottom: 25px; 
    }
    
    .logo-badge { 
      background-color: #0f172a; 
      padding: 8px 14px; 
      border-radius: 6px; 
      display: inline-flex; 
      align-items: center;
      border: 1px solid #1e293b;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .logo { font-size: 22px; font-weight: 900; letter-spacing: -1px; color: #ffffff; }
    .logo-blue { color: #0d6efd; }
    
    .theme-toggle { font-size: 22px; cursor: pointer; user-select: none; }
    
    /* Form Elements - Neutral Fields but Original Style */
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 11px; font-weight: 700; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    
    input[type="text"], input[type="number"], textarea { 
      width: 100%; 
      background-color: #1e293b; 
      border: 1px solid #334155; 
      border-radius: 6px; 
      color: #ffffff; 
      padding: 14px; 
      font-size: 16px; 
      transition: all 0.3s ease; 
    }
    input:focus, textarea:focus { outline: none; border-color: #0d6efd; box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.2); }
    textarea { min-height: 100px; }
    
    /* Yes/No Toggle Buttons */
    .toggle-group { display: flex; gap: 12px; }
    .toggle-group input[type="radio"] { display: none; }
    .toggle-label { 
      flex: 1; text-align: center; background-color: #1e293b; padding: 16px; border-radius: 6px; 
      font-weight: 900; font-size: 16px; cursor: pointer; color: #fff; border: 1px solid #334155;
    }
    .toggle-group input[type="radio"]:checked + .toggle-label { 
      background-color: #334155; border-color: #0d6efd; box-shadow: inset 0 0 0 1px #0d6efd; 
    }
    
    /* Submit Button */
    .submit-btn { 
      width: 100%; background-color: #0d6efd; color: #ffffff; border: none; border-radius: 6px; 
      padding: 18px; font-size: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; 
    }
    
    /* Footer Branding - Restored */
    .branding { text-align: center; margin-top: 40px; font-size: 12px; color: #475569; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .footer-credits { margin-top: 12px; font-size: 10px; color: #334155; }
    .footer-credits a { color: #0d6efd; text-decoration: none; }

    /* Light Mode Overrides */
    body.light-mode { background-color: #f8fafc; color: #0f172a; }
    body.light-mode input, body.light-mode textarea, body.light-mode .toggle-label { background-color: #ffffff; border: 1px solid #cbd5e1; color: #0f172a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-badge">
        <div class="logo">SEND<span class="logo-blue">IT</span>IN</div>
      </div>
      <div class="theme-toggle" id="themeToggle">☀️</div>
    </div>

    <form id="submissionForm">
      <div class="form-group">
        <label>PIN NUMBER</label>
        <input type="number" name="pin" placeholder="Enter 4-digit PIN" required>
      </div>
      <div class="form-group">
        <label>ASSIGNMENT</label>
        <input type="text" name="assignment" placeholder="Job Location / Unit" required>
      </div>
      <div class="form-group">
        <label>QUANTITY / VALUE</label>
        <input type="text" name="quantity" placeholder="Enter Amount" required>
      </div>
      <div class="form-group">
        <label>REFERENCE / TICKET #</label>
        <input type="text" name="reference" placeholder="Enter Ref #">
      </div>
      <div class="form-group">
        <label>NOTES</label>
        <textarea name="notes" placeholder="Any additional info..."></textarea>
      </div>
      <div class="form-group">
        <label>TASK COMPLETE?</label>
        <div class="toggle-group">
          <input type="radio" id="job-yes" name="complete" value="YES" checked required>
          <label class="toggle-label" for="job-yes">YES</label>
          <input type="radio" id="job-no" name="complete" value="NO">
          <label class="toggle-label" for="job-no">NO</label>
        </div>
      </div>
      <button type="submit" class="submit-btn">SEND IT IN</button>
    </form>
    
    <div class="branding">
      <p>LOGISTICS TRACKING V2.0</p>
      <div class="footer-credits">
        Built by <a href="https://machinolabs.com" target="_blank">MachinoLabs</a> • Joe • 717.623.2907
      </div>
    </div>
  </div>

  <script>
    // Theme Toggle Logic
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
      themeToggle.innerText = document.body.classList.contains('light-mode') ? '🌙' : '☀️';
    });

    // Form Submission Logic
    const form = document.getElementById('submissionForm');
    const submitBtn = document.querySelector('.submit-btn');
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxOPI_3MGYK8scF11HdjZQy67fvOI0dQnZnzwQ6xx_UOturhPFDT3EvD0hyLDGw_lOJ_w/exec'; 

    form.addEventListener('submit', e => {
      e.preventDefault();
      submitBtn.innerText = 'SENDING...';
      submitBtn.disabled = true;

      fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(response => {
          submitBtn.innerText = 'SENT! 👍';
          form.reset();
          setTimeout(() => { submitBtn.innerText = 'SEND IT IN'; submitBtn.disabled = false; }, 3000);
        })
        .catch(error => {
          submitBtn.innerText = 'ERROR - TRY AGAIN';
          submitBtn.disabled = false;
        });
    });
  </script>
</body>
</html>
