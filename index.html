<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SEND IT IN</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    /* CSS Variables for Theming */
    :root {
      --bg-color: #0f172a;
      --surface-color: #1e293b;
      --text-color: #ffffff;
      --label-color: #94a3b8;
      --border-color: #334155;
      --primary-blue: #3b82f6;
      --primary-hover: #2563eb;
      --pill-active-text: #0f172a;
    }

    body.light-mode {
      --bg-color: #f8fafc;
      --surface-color: #ffffff;
      --text-color: #0f172a;
      --label-color: #64748b;
      --border-color: #cbd5e1;
      --pill-active-text: #ffffff;
    }

    /* Reset & Base Styles */
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    }
    
    body { 
      background-color: var(--bg-color); 
      color: var(--text-color); 
      display: flex; 
      justify-content: center; 
      padding: 20px; 
      min-height: 100vh;
      transition: background-color 0.3s ease, color 0.3s ease; 
    }

    .container { 
      width: 100%; 
      max-width: 440px; 
      display: flex; 
      flex-direction: column; 
    }

    /* Header */
    .header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .header-logo {
      height: 38px;
      object-fit: contain;
    }

    .theme-toggle {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-color);
      outline: none;
      padding: 5px;
      user-select: none;
    }

    /* Form Styles */
    form { 
      display: flex; 
      flex-direction: column; 
      gap: 20px; 
    }
    
    .form-group { 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
    }
    
    label { 
      font-size: 11px; 
      font-weight: 700; 
      text-transform: uppercase; 
      color: var(--label-color); 
      letter-spacing: 1px; 
    }

    input, textarea {
      background-color: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      color: var(--text-color);
      font-size: 16px; /* Prevents iOS auto-zoom */
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    
    input::placeholder, textarea::placeholder {
      color: #64748b;
    }

    input:focus, textarea:focus { 
      border-color: var(--primary-blue); 
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    /* YES/NO Pill Buttons */
    .button-group { 
      display: flex; 
      gap: 12px; 
    }
    
    .toggle-btn {
      flex: 1;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: var(--surface-color);
      color: var(--text-color);
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s ease;
    }
    
    .toggle-btn.active {
      background-color: var(--primary-blue);
      color: var(--pill-active-text);
      border-color: var(--primary-blue);
    }

    /* Submit Button */
    .submit-btn {
      background-color: var(--primary-blue);
      color: #ffffff;
      border: none;
      border-radius: 12px;
      padding: 18px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: background-color 0.2s ease, transform 0.1s active;
    }

    .submit-btn:hover {
      background-color: var(--primary-hover);
    }
    
    .submit-btn:active {
      transform: scale(0.98);
    }

    .submit-btn:disabled { 
      opacity: 0.7; 
      cursor: not-allowed; 
      transform: none;
    }

    /* Footer Branding */
    .footer {
      text-align: center;
      margin-top: 40px;
      padding-bottom: 20px;
    }
    
    .footer p {
      font-size: 12px;
      color: var(--label-color);
      font-weight: 500;
      margin-bottom: 6px;
    }
    
    .footer-credits {
      font-size: 12px;
      color: var(--label-color);
      font-weight: 500;
    }
    
    .footer-credits a {
      color: var(--primary-blue);
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <img src="icon-192.png" alt="SEND IT IN Logo" class="header-logo">
    <button class="theme-toggle" id="theme-toggle" title="Toggle Light/Dark Mode">☀️</button>
  </div>

  <form id="submission-form">
    <div class="form-group">
      <label>PIN NUMBER</label>
      <input type="number" name="pin" placeholder="Enter 4-digit PIN" required pattern="\d*">
    </div>

    <div class="form-group">
      <label>ASSIGNMENT / LOCATION</label>
      <input type="text" name="assignment" placeholder="Crew ID / Truck # / Job Site" required>
    </div>

    <div class="form-group">
      <label>QUANTITY / VALUE</label>
      <input type="text" name="quantity" placeholder="Enter Amount" required>
    </div>

    <div class="form-group">
      <label>REFERENCE / TICKET #</label>
      <input type="text" name="reference" placeholder="e.g. WO-405 or Customer Name">
    </div>

    <div class="form-group">
      <label>NOTES</label>
      <textarea name="notes" placeholder="Issues on site, needed for tomorrow..."></textarea>
    </div>

    <div class="form-group">
      <label>TASK COMPLETE?</label>
      <div class="button-group">
        <button type="button" class="toggle-btn active" id="btn-yes" onclick="setComplete('YES')">YES</button>
        <button type="button" class="toggle-btn" id="btn-no" onclick="setComplete('NO')">NO</button>
      </div>
      <input type="hidden" name="complete" id="complete-value" value="YES">
    </div>

    <button type="submit" class="submit-btn" id="submit-btn">SEND IT IN</button>
  </form>

  <div class="footer">
    <p>Built with the StupidSimpleCrazyFast™ framework.</p>
    <div class="footer-credits">
      Built by <a href="https://machinolabs.com" target="_blank">MachinoLabs</a>
    </div>
  </div>
</div>

<script>
  // Theme Toggle Logic
  const themeToggle = document.getElementById('theme-toggle');
  themeToggle.addEventListener('click', () => {
    document.body.classList.toggle('light-mode');
    if (document.body.classList.contains('light-mode')) {
      themeToggle.innerText = '🌙';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', '#f8fafc');
    } else {
      themeToggle.innerText = '☀️';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', '#0f172a');
    }
  });

  // YES/NO Button Logic
  function setComplete(val) {
    document.getElementById('complete-value').value = val;
    document.getElementById('btn-yes').classList.toggle('active', val === 'YES');
    document.getElementById('btn-no').classList.toggle('active', val === 'NO');
  }

  // Form Submission Logic
  const form = document.getElementById('submission-form');
  const submitBtn = document.getElementById('submit-btn');
  // V2.0 Router Script URL
  const scriptURL = 'https://script.google.com/macros/s/AKfycbxOPI_3MGYK8scF11HdjZQy67fvOI0dQnZnzwQ6xx_UOturhPFDT3EvD0hyLDGw_lOJ_w/exec';

  form.addEventListener('submit', e => {
    e.preventDefault();
    const originalBtnText = submitBtn.innerText;
    submitBtn.innerText = 'SENDING...';
    submitBtn.disabled = true;
    submitBtn.style.backgroundColor = '#f59e0b'; // UI feedback: sending (orange)

    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(response => {
        submitBtn.innerText = 'SENT! 👍';
        submitBtn.style.backgroundColor = '#10b981'; // UI feedback: success (green)
        form.reset();
        setComplete('YES'); // Reset toggle to default
        
        // Return button to normal after 3 seconds
        setTimeout(() => {
          submitBtn.innerText = originalBtnText;
          submitBtn.style.backgroundColor = ''; 
          submitBtn.disabled = false;
        }, 3000);
      })
      .catch(error => {
        console.error('Error!', error.message);
        submitBtn.innerText = 'ERROR - TRY AGAIN';
        submitBtn.style.backgroundColor = '#ef4444'; // UI feedback: error (red)
        submitBtn.disabled = false;
      });
  });

  // PWA Service Worker Registration
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('PWA Service Worker registered!'))
        .catch(err => console.error('PWA Service Worker failed', err));
    });
  }
</script>

</body>
</html>
