<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEND IT IN</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    /* Reset & Base Styles */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    
    body { 
      background-color: #0f172a; 
      color: #ffffff; 
      display: flex; 
      justify-content: center; 
      padding: 30px 20px; 
    }

    .container { width: 100%; max-width: 480px; }

    .header { 
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 { font-size: 1.8rem; letter-spacing: 2px; color: #38bdf8; text-transform: uppercase; }
    .header p { color: #94a3b8; font-size: 0.8rem; margin-top: 5px; letter-spacing: 1px; }

    /* Form Styles */
    form { display: flex; flex-direction: column; gap: 20px; }

    .form-group { display: flex; flex-direction: column; gap: 8px; }

    label { 
      font-size: 0.7rem; 
      font-weight: 700; 
      text-transform: uppercase; 
      color: #38bdf8; 
      letter-spacing: 1px;
    }

    input, textarea, select {
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 14px;
      color: #ffffff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    input:focus, textarea:focus, select:focus { border-color: #38bdf8; }

    textarea { resize: vertical; min-height: 80px; }

    button {
      background-color: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      padding: 18px;
      font-size: 1.1rem;
      font-weight: 900;
      cursor: pointer;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:disabled { background-color: #475569; cursor: not-allowed; }

    /* Custom Select Styling */
    select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>SEND IT IN</h1>
    <p>UNIVERSAL LOGISTICS V2</p>
  </div>

  <form id="submit-form">
    <div class="form-group">
      <label>PIN NUMBER</label>
      <input type="number" name="pin" placeholder="0000" required>
    </div>

    <div class="form-group">
      <label>ASSIGNMENT</label>
      <input type="text" name="assignment" placeholder="Truck # / Location" required>
    </div>

    <div class="form-group">
      <label>QUANTITY / VALUE</label>
      <input type="text" name="quantity" placeholder="Amount / Loads" required>
    </div>

    <div class="form-group">
      <label>REFERENCE / TICKET #</label>
      <input type="text" name="reference" placeholder="Job #">
    </div>

    <div class="form-group">
      <label>NOTES</label>
      <textarea name="notes" placeholder="Enter details here..."></textarea>
    </div>

    <div class="form-group">
      <label>TASK COMPLETE?</label>
      <select name="complete">
        <option value="YES">YES</option>
        <option value="NO">NO</option>
      </select>
    </div>

    <button type="submit" id="submit-btn">SEND IT IN</button>
  </form>
</div>

<script>
  const form = document.getElementById('submit-form');
  const submitBtn = document.getElementById('submit-btn');
  // YOUR LIVE ROUTER URL
  const scriptURL = 'https://script.google.com/macros/s/AKfycbxOPI_3MGYK8scF11HdjZQy67fvOI0dQnZnzwQ6xx_UOturhPFDT3EvD0hyLDGw_lOJ_w/exec';

  form.addEventListener('submit', e => {
    e.preventDefault();
    submitBtn.innerText = 'SENDING...';
    submitBtn.disabled = true;

    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(response => {
        alert('SUCCESS: Data Logged.');
        submitBtn.innerText = 'SEND IT IN';
        submitBtn.disabled = false;
        form.reset();
      })
      .catch(error => {
        alert('ERROR: Check PIN and connection.');
        submitBtn.innerText = 'TRY AGAIN';
        submitBtn.disabled = false;
      });
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js');
    });
  }
</script>

</body>
</html>
