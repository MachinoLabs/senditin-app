<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEND IT IN</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    /* Reset & Base Styles */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    
    body { 
      background-color: #0f172a; 
      color: #ffffff; 
      display: flex; 
      justify-content: center; 
      padding: 30px 20px; 
    }

    .container { width: 100%; max-width: 480px; }

    .header { 
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 { font-size: 1.8rem; letter-spacing: 2px; color: #38bdf8; }
    .header p { color: #94a3b8; font-size: 0.9rem; margin-top: 5px; }

    /* Form Styles */
    form { display: flex; flex-direction: column; gap: 20px; }

    .form-group { display: flex; flex-direction: column; gap: 8px; }

    label { 
      font-size: 0.75rem; 
      font-weight: 700; 
      text-transform: uppercase; 
      color: #38bdf8; 
      letter-spacing: 1px;
    }

    input, textarea, select {
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 14px;
      color: #ffffff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus, select:focus { border-color: #38bdf8; }

    textarea { resize: vertical; min-height: 80px; }

    button {
      background-color: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.1s, background-color 0.2s;
    }

    button:active { transform: scale(0.98); }
    button:disabled { background-color: #475569; cursor: not-allowed; }

    /* Success/Error States */
    .status-msg {
      text-align: center;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>SEND IT IN</h1>
    <p>UNIVERSAL FIELD REPORT V1</p>
  </div>

  <form id="submit-form">
    <div class="form-group">
      <label>PIN NUMBER</label>
      <input type="number" name="pin" placeholder="Enter your 4-digit PIN" required>
    </div>

    <div class="form-group">
      <label>ASSIGNMENT</label>
      <input type="text" name="assignment" placeholder="Truck # / Crew / Location" required>
    </div>

    <div class="form-group">
      <label>QUANTITY / VALUE</label>
      <input type="text" name="quantity" placeholder="Tons / Loads / Amount" required>
    </div>

    <div class="form-group">
      <label>REFERENCE / TICKET #</label>
      <input type="text" name="reference" placeholder="Job # or Ticket #" required>
    </div>

    <div class="form-group">
      <label>NOTES</label>
      <textarea name="notes" placeholder="Additional details..."></textarea>
    </div>

    <div class="form-group">
      <label>TASK COMPLETE?</label>
      <select name="complete">
        <option value="YES">YES</option>
        <option value="NO">NO</option>
      </select>
    </div>

    <button type="submit" id="submit-btn">SEND IT IN</button>
  </form>
</div>

<script>
  const form = document.getElementById('submit-form');
  const submitBtn = document.getElementById('submit-btn');
  const scriptURL = 'https://script.google.com/macros/s/AKfycbzztIkmEt71zyEpX_mTq1XRjuzwRbT_CZ3n9I2rxHrYrWT2V9sn_hgpeL_-iyzyRo6KXQ/exec';

  form.addEventListener('submit', e => {
    e.preventDefault();
    submitBtn.innerText = 'SENDING...';
    submitBtn.disabled = true;

    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(response => {
        alert('SUCCESS: Report Filed!');
        submitBtn.innerText = 'SENT! 👍';
        form.reset();
        setTimeout(() => {
          submitBtn.innerText = 'SEND IT IN';
          submitBtn.disabled = false;
        }, 3000);
      })
      .catch(error => {
        alert('ERROR: Check connection and try again.');
        submitBtn.innerText = 'TRY AGAIN';
        submitBtn.disabled = false;
      });
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js');
    });
  }
</script>

</body>
</html>
