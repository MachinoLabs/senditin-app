<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEND IT IN</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    /* YOUR EXACT BRANDING STYLES */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: #0f172a; color: #ffffff; display: flex; justify-content: center; padding: 30px 20px; }
    .container { width: 100%; max-width: 480px; }
    
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; padding-bottom: 15px; margin-bottom: 25px; }
    .logo { font-size: 24px; font-weight: 900; letter-spacing: -1.5px; color: #ffffff; text-transform: uppercase; }
    .logo-blue { color: #0d6efd; }
    
    .tagline { font-size: 10px; font-weight: 800; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; margin-top: 5px; }
    .tagline-blue { color: #0d6efd; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 11px; font-weight: 700; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    input[type="text"], textarea { width: 100%; background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #ffffff; padding: 14px; font-size: 16px; transition: border-color 0.2s; }
    input:focus, textarea:focus { outline: none; border-color: #0d6efd; }
    textarea { min-height: 100px; resize: none; }

    .toggle-group { display: flex; gap: 12px; }
    .toggle-group input[type="radio"] { display: none; }
    .toggle-label { flex: 1; text-align: center; background-color: #1e293b; padding: 16px; border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer; color: #fff; border: 1px solid #334155; text-transform: uppercase; }
    .toggle-group input[type="radio"]:checked + .toggle-label { background-color: #0d6efd; border-color: #0d6efd; }

    .submit-btn { width: 100%; background-color: #0d6efd; color: #ffffff; border: none; border-radius: 8px; padding: 18px; font-size: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); }
    .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }

    .footer-brand { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #1e293b; }
    .v8-tag { font-size: 9px; color: #1e293b; margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <div class="logo">SEND<span class="logo-blue">IT</span>IN</div>
        <div class="tagline">STUPIDSIMPLE<span class="tagline-blue">CRAZY</span>FAST™</div>
      </div>
      <div style="font-size: 10px; font-weight: bold; color: #334155;">V8_ACTIVE</div>
    </div>

    <form id="submissionForm">
      <div class="form-group">
        <label>Company PIN</label>
        <input type="text" name="company_pin" placeholder="####" required pattern="\d*">
      </div>

      <div class="form-group">
        <label>Crew ID / Truck #</label>
        <input type="text" name="crew_id" placeholder="Unit Number" required>
      </div>

      <div class="form-group">
        <label>Customer / Work Order #</label>
        <input type="text" name="work_order" placeholder="WO #" required>
      </div>

      <div class="form-group">
        <label>Work Performed</label>
        <textarea name="work_performed" placeholder="Details of service..." required></textarea>
      </div>
      
      <div class="form-group">
        <label>Notes - Follow-ups - Materials</label>
        <textarea name="notes" placeholder="Internal notes or needed parts..."></textarea>
      </div>

      <div class="form-group">
        <label>Is Job Finished?</label>
        <div class="toggle-group">
          <input type="radio" id="job-yes" name="job_complete" value="yes" required>
          <label class="toggle-label" for="job-yes">YES</label>
          <input type="radio" id="job-no" name="job_complete" value="no">
          <label class="toggle-label" for="job-no">NO</label>
        </div>
      </div>

      <button type="submit" class="submit-btn">SEND IT IN</button>
    </form>
    
    <div class="footer-brand">
      <div class="logo" style="font-size: 14px; opacity: 0.5;">SEND<span class="logo-blue">IT</span>IN</div>
      <div class="v8-tag">ENGINE_V8_ROUTING_STABLE</div>
    </div>
  </div>

  <script>
    // YOUR NEW V8 DEPLOYMENT URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbye0BAdQbvozSKtiasGpzge7vIF_2QNR0-gZhJs4ekXFwyYFytakZ3ChaBzLUNo4ofqFw/exec';

    document.getElementById('submissionForm').addEventListener('submit', e => {
      e.preventDefault();
      const submitBtn = document.querySelector('.submit-btn');
      submitBtn.innerText = 'SENDING...';
      submitBtn.disabled = true;

      // JSON PACKAGING - FIXES SCRAMBLED COLUMNS
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      fetch(scriptURL, { 
        method: 'POST', 
        mode: 'no-cors',
        body: JSON.stringify(data) 
      })
      .then(() => {
          submitBtn.innerText = 'SENT! 👍';
          submitBtn.style.backgroundColor = '#198754';
          e.target.reset();
          setTimeout(() => {
            submitBtn.innerText = 'SEND IT IN';
            submitBtn.style.backgroundColor = ''; 
            submitBtn.disabled = false;
          }, 3000);
      })
      .catch(error => {
          submitBtn.innerText = 'ERROR - TRY AGAIN';
          submitBtn.disabled = false;
      });
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
